<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
  <style>
body {
    background-color: #f8f9fa;
    padding-top: 80px; /* Space for fixed navbar */
}
.loan-wrapper {
    min-height: calc(100vh - 150px);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}
@media (max-width: 1023px) {
    .back-nav {
        display: block !important;
        margin-top: 0 !important;
    }
}
.loan-card {
    background: white;
    width: 100%;
    max-width: 400px;
    padding: 30px;
    border-radius: 18px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.1);
    text-align: center;
}
@media (max-width: 480px) {
    .loan-card {
        padding: 20px;
        box-shadow: none;
    }
}
.loan-card h3 {
    color: #1f3cff;
    margin-bottom: 20px;
}
.input-group {
    text-align: left;
    margin-bottom: 15px;
}
.input-group label {
    font-size: 14px;
}
.input-group input {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border: 1px solid #ccc;
}
.calc-btn {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #1f3cff;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}
.calc-btn:hover {
    background: #162dcc;
}
.result {
    margin-top: 18px;
    text-align: left;
}
.result p {
    margin: 6px 0;
    font-size: 14px;
}

  </style>
</head>
<body>
      <nav class="navbar navbar-expand-lg fixed-top navbar-light bg-light">
  <div class="container-fluid">
    <a class="navbar-brand" href="#" >
      <img width="50" height="50" src="https://img.icons8.com/nolan/64/shopping-cart-loaded.png" alt="shopping-cart-loaded" class="d-inline-block align-text-top " style="margin-top: -10px;"/>
      <span id="compare">Compare</span><span>Kart</span>
    </a>
    <div class="d-flex align-items-center">
      <div id="avatar" class="d-lg-none">TK</div>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCompareKart" aria-controls="navbarCompareKart" aria-expanded="false" aria-label="Toggle navigation" style="margin-left: 10px;">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>
    <div class="collapse navbar-collapse justify-content-end" id="navbarCompareKart">
      <div class="btn-grp1">
        <button class="btn catog" onclick='location.href="index.html"'>🏠︎ Home</button>
        <button class="btn catog" onclick='location.href="compare.html"'>📱 Mobile</button>
        <button class="btn catog" onclick='location.href="laptop.html"'>💻 Laptop</button> 
        <button class="btn catog" onclick='location.href="car.html"'>🚗 Cars</button> 
        <div id="avatar" class="d-none d-lg-flex">TK</div>
      </div>
    </div>
  </div>
</nav>
<div class="back-nav">
  <a href="javascript:history.back()" class="back-link">
    <img width="20" height="20" src="https://img.icons8.com/ios-glyphs/30/1a2db8/back.png" alt="back"/> Back
  </a>
</div>

<div class="loan-wrapper">
    <div class="loan-card">

        <h3><b> Loan Calculator 💰</b></h3>

        <div class="input-group">
            <label>Loan Amount (₹)</label>
            <input style="border-radius: 8px;" class="in" type="number" id="amount" placeholder="Enter loan amount">
        </div>

        <div class="input-group">
            <label>Interest Rate (%)</label>
            <input style="border-radius: 8px;"class="in" type="number" id="rate" value="9">
        </div>

        <div class="input-group">
            <label>Tenure (Years)</label>
            <input style="border-radius: 8px;" class="in" type="number" id="years" value="3">
        </div>

        <button class="calc-btn" onclick="calculateEMI()">Calculate EMI</button>

        <div class="result">
            <p>Monthly EMI: <span id="emi">—</span></p>
            <p>Total Interest: <span id="interest">—</span></p>
            <p>Total Amount: <span id="total">—</span></p>
        </div>

    </div>
</div>



</body>
</html>
